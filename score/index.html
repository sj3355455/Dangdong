<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>당동 점수판</title>
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-192.png">
<style>
:root{--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
  --bg:#0e1114;--card:#1a1f26;--text:#e9ecef;--muted:#8b94a1;
  --line:#2c333d;--accent:#ff8c42;--danger:#e5484d;--ok:#3dd68c;
  --wz:#f2f1ec;--wz-hi:#ffffff;--wz-text:#171a1e;
  --yz:#f0be3e;--yz-hi:#ffd257;--yz-text:#231a04;}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif;
  touch-action:manipulation;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);overflow:hidden;
  -webkit-text-size-adjust:100%}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;user-select:text;-webkit-user-select:text}
a{color:inherit;text-decoration:none}
.screen{width:100%;height:100%;position:absolute;top:0;left:0;display:none;
  flex-direction:column;align-items:center;padding:calc(16px + var(--sat)) 16px calc(16px + var(--sab))}
.scroller{overflow-y:auto;justify-content:flex-start;padding-top:calc(56px + var(--sat))}
.nav-toggle{display:flex;background:#1a1f26;border-radius:12px;padding:4px;width:100%;max-width:320px;margin-bottom:24px}
.nav-btn{flex:1;text-align:center;padding:10px 0;font-weight:700;font-size:.95rem;color:var(--muted);border-radius:8px;transition:all .2s}
.nav-btn.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.3)}
.field{width:100%;background:#1a1f26;border:1px solid var(--line);color:#fff;
  border-radius:12px;padding:14px 16px;font-size:1.05rem;transition:border-color .2s;
  margin-bottom:12px;outline:none}
.field:focus{border-color:var(--accent)}
select.field{appearance:none;background-image:
  url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b949e%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
  background-repeat:no-repeat;background-position:right 14px center;background-size:12px auto}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;
  width:100%;max-width:420px;padding:20px;margin-bottom:16px;transition:border-color .2s;position:relative}
.pcard.me{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.prow{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dot{width:22px;height:22px;border-radius:50%;box-shadow:inset 0 -2px 4px rgba(0,0,0,.15);flex-shrink:0}
.dot.w{background:linear-gradient(135deg,var(--wz-hi),var(--wz))}
.dot.y{background:linear-gradient(135deg,var(--yz-hi),var(--yz))}
.dot.r{background:linear-gradient(135deg,var(--rz-hi),var(--rz))}
.dot.b{background:linear-gradient(135deg,var(--bz-hi),var(--bz))}
.plbl{font-size:.85rem;font-weight:700;padding:3px 8px;border-radius:6px;margin-right:auto}
.plbl.me{background:rgba(0,122,255,.15);color:var(--accent)}
.plbl.opp{background:#232a33;color:var(--muted)}
.trow{display:flex;justify-content:space-between;align-items:flex-end}
.trow .lbl{font-size:.9rem;color:var(--muted);margin-bottom:4px;display:block}
.trow .mbtn{background:#232a33;color:var(--text);border:none;border-radius:8px;
  padding:10px 18px;font-size:1rem;font-weight:600}
.trow .mbtn:active{background:#333c47}
.seg{display:flex;background:#1a1f26;border-radius:10px;padding:4px;width:100%;max-width:420px;margin-bottom:24px}
.seg button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0;
  border-radius:8px;font-weight:600;font-size:1rem;transition:all .2s}
.seg button.on{background:#232a33;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.firstseg{display:flex;align-items:center;background:#1a1f26;border-radius:10px;padding:4px;width:100%;max-width:420px;margin-bottom:24px}
.firstseg .cap{font-size:.9rem;color:var(--muted);font-weight:600;padding:0 12px;margin-right:8px;border-right:1px solid var(--line)}
.firstseg button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0;
  border-radius:8px;font-weight:600;font-size:.95rem;transition:all .2s}
.firstseg button.on{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(0,122,255,.2)}
.bigbtn{width:100%;max-width:420px;background:var(--accent);color:#fff;border:none;
  padding:16px;border-radius:14px;font-size:1.1rem;font-weight:700;margin-top:10px;
  box-shadow:0 4px 12px rgba(0,122,255,.25)}
.bigbtn:active{transform:scale(.98);background:#0062cc}
.bigbtn:disabled{opacity:.5;pointer-events:none}
.linkbtn{background:none;border:none;color:var(--muted);font-size:.95rem;text-decoration:underline;
  margin-top:20px;padding:10px;display:block;text-align:center;width:100%}
.err{color:var(--danger);font-size:.9rem;min-height:1.2em;text-align:center;width:100%;max-width:420px}
.pip{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:6px}
.pip.off{background:var(--muted)}

#game{flex-direction:column;align-items:stretch}
#gameZones{flex:1;display:flex;flex-direction:column;gap:16px;width:100%;height:100%}
@media (orientation:landscape){ #gameZones{flex-direction:row} }
@media (orientation:landscape){ #game{flex-direction:row} }
.zone{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;
  justify-content:center;transition:filter .25s;overflow:hidden;cursor:pointer;width:100%}
.zone.w{background:radial-gradient(120% 100% at 50% 0%,var(--wz-hi),var(--wz));color:var(--wz-text)}
.zone.y{background:radial-gradient(120% 100% at 50% 100%,var(--yz-hi),var(--yz));color:var(--yz-text)}
.zone.off{filter:brightness(.42) saturate(.55)}
.zone .zname{font-size:clamp(1rem,2.6vmin,1.4rem);font-weight:700;opacity:.75;
  display:flex;align-items:center;gap:8px}
.turnchip{font-size:.7em;background:rgba(0,0,0,.75);color:#fff;border-radius:999px;
  padding:3px 10px;font-weight:700;display:none}
.zone.on .turnchip{display:inline-block}
.zscore{font-size:clamp(64px,22vmin,150px);font-weight:900;line-height:1.05;
  font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.zscore.pop{animation:pop .18s ease-out}
@keyframes pop{40%{transform:scale(1.14)}100%{transform:scale(1)}}
.ztarget{font-size:clamp(.85rem,2.4vmin,1.1rem);opacity:.6;font-weight:600;margin-top:-4px}
.zstats{font-size:clamp(.75rem,2.2vmin,1rem);opacity:.65;margin-top:8px;font-weight:600}
.runbadge{position:absolute;font-size:clamp(1rem,3.4vmin,1.5rem);font-weight:800;
  background:rgba(0,0,0,.78);color:#ffd257;border-radius:999px;padding:5px 14px;
  opacity:0;transition:opacity .15s}
.zone.on .runbadge.show{opacity:1}
.zone .runbadge{top:calc(12px + var(--sat));right:14px}
@media (orientation:landscape){
  .zone .runbadge{top:auto;bottom:14px;right:14px}
}
.minusbtn{position:absolute;background:rgba(0,0,0,.55);color:#fff;border-radius:999px;
  padding:10px 18px;font-weight:800;font-size:1rem;backdrop-filter:blur(4px); z-index:11;}
.minusbtn:active{background:var(--danger)}
.zone .minusbtn{top:calc(12px + var(--sat));left:14px}
@media (orientation:landscape){ .zone .minusbtn{top:auto;bottom:14px;left:14px} }

#mid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;flex-direction:row;gap:10px;z-index:5}
@media (orientation:landscape){ #mid{flex-direction:column} }
#mid>*{pointer-events:auto}
.midpill{background:rgba(10,12,15,.88);border:1px solid var(--line);color:var(--text);
  border-radius:999px;padding:10px 16px;font-weight:800;font-size:.95rem;
  font-variant-numeric:tabular-nums;backdrop-filter:blur(6px);white-space:nowrap}
.midbtn{width:44px;height:44px;border-radius:50%;background:var(--card);
  border:1px solid var(--line);color:var(--text);font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.2);transition:transform .1s}
.midbtn:active{background:#333c47;transform:scale(.95)}

.ovl{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);
  z-index:90;display:flex;align-items:center;justify-content:center;opacity:0;
  pointer-events:none;transition:opacity .2s;padding:20px}
.ovl.on{opacity:1;pointer-events:auto}
.ovlcard{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:13px;
  max-height:calc(100% - 40px);overflow-y:auto}
.ovlcard h2{font-size:1.25rem;text-align:center}
.ovlcard .big{font-size:2rem;text-align:center}
.statgrid{width:100%;border-collapse:collapse;font-size:.88rem}
.statgrid th,.statgrid td{padding:7px 3px;text-align:center;border-bottom:1px solid var(--line);
  font-variant-numeric:tabular-nums}
.statgrid th{color:var(--muted);font-weight:600}
.statgrid td:first-child,.statgrid th:first-child{text-align:left}
.obtn{width:100%;padding:13px 0;border-radius:12px;font-weight:700;font-size:1rem;
  background:#1a1f26;border:1px solid var(--line);color:var(--text)}
.obtn:active{background:#232a33}
.obtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.obtn.ghost{color:var(--muted)}
.savestat{text-align:center;font-size:.85rem;color:var(--muted);min-height:1.2em}
.savestat.ok{color:var(--ok)} .savestat.warn{color:var(--accent)}

#toast{position:fixed;left:50%;bottom:calc(24px + var(--sab));transform:translateX(-50%);
  background:rgba(10,12,15,.92);border:1px solid var(--line);color:var(--text);
  padding:10px 18px;border-radius:999px;font-size:.85rem;opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:99;max-width:90vw;text-align:center}
#toast.on{opacity:1}
</style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div id="auth" class="screen scroller" style="justify-content:center">
  <div style="font-size:4rem; margin-bottom:10px; animation:float 3s ease-in-out infinite;">🎱</div>
  <style>@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}</style>
  <div class="sub" style="margin-bottom:16px">로그인하면 경기 기록이 서버에 저장되고<br>선수를 목록에서 고를 수 있어요</div>

  <div class="seg">
    <button id="tabLogin" class="on">로그인</button>
    <button id="tabSignup">회원가입</button>
  </div>

  <div class="pcard">
    <input class="field" id="aName" autocomplete="username" autocapitalize="off" spellcheck="false" maxlength="10" placeholder="이름">
    <input class="field" id="aPass" type="password" autocomplete="current-password" placeholder="비밀번호 (6자 이상)">
  </div>

  <div class="err" id="aErr"></div>
  <button class="bigbtn" id="btnAuth">로그인</button>
  <button class="linkbtn" id="btnGuest">로그인 없이 쓰기 (기록 저장 안 됨)</button>
  <div style="text-align:center; margin-top:20px;">
    <span style="font-size:0.75rem; color:var(--muted);">v64</span>
  </div>
</div>

<!-- ══ 설정 화면 ══ -->
<div id="setup" class="screen scroller">
  <h1 style="width:100%; max-width:420px; margin:0 0 16px 0; font-size:1.6rem; text-align:center; position:relative;">
    🎱 당동 점수판
    <button onclick="location.href = location.href.split('?')[0] + '?_t=' + Date.now()" style="position:absolute; right:0; top:0; background:none; border:none; font-size:1.2rem; cursor:pointer;" title="새로고침">🔄</button>
  </h1>
  <div class="nav-toggle">
    <a href="../score/" class="nav-btn on">🎱 점수판</a>
    <a href="../record/" class="nav-btn">📊 기록실</a>
  </div>

  <div class="seg" id="gameTypeSeg" style="margin-bottom:16px;">
    <button data-v="2인">2인</button>
    <button data-v="3인">3인</button>
    <button data-v="4인">4인</button>
    <button data-v="팀전">팀전</button>
  </div>

  <div id="setupCards" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>

  <div class="firstseg" style="margin-top:8px;">
    <span class="cap">내 공</span>
    <div id="myBallSeg" style="flex:1; display:flex; gap:6px;"></div>
  </div>

  <div class="err" id="sErr"></div>
  <button class="bigbtn" id="btnStart">경기 시작</button>
  <div class="savenote" id="saveNote"></div>
  <div style="text-align:center; margin-top:20px; display:flex; align-items:center; justify-content:center; gap:8px;">
    <button class="linkbtn" id="btnLogout">로그아웃 (처음으로)</button>
    <span style="font-size:0.75rem; color:var(--muted);">v64</span>
  </div>
</div>

<!-- ══ 게임 화면 ══ -->
<div id="game" class="screen">
  <div id="gameZones"></div>
  <div id="mid">
    <button class="midbtn" id="btnUndo" title="되돌리기">↩</button>
    <span class="midpill" id="inning">1이닝</span>
    <button class="midbtn" id="btnMenu" title="메뉴">☰</button>
  </div>
</div>

<!-- ══ 승리 오버레이 ══ -->
<div class="ovl" id="winOvl">
  <div class="ovlcard">
    <div class="big">🏆</div>
    <h2 id="winTitle">목표 달성!</h2>
    <table class="statgrid" id="winStats"></table>
    <div class="savestat" id="saveStat"></div>
    <button class="obtn primary" id="btnWinNew">경기 종료 · 새 경기</button>
    <button class="obtn" id="btnWinCont">계속치기 (꼴등전)</button>
    <button class="obtn ghost" id="btnWinUndo">↩ 방금 점수 취소</button>
  </div>
</div>

<!-- ══ 메뉴 오버레이 ══ -->
<div class="ovl" id="menuOvl">
  <div class="ovlcard">
    <h2>메뉴</h2>
    <button class="obtn primary" id="btnMenuClose">경기 계속</button>
    <button class="obtn" id="btnMenuRestart">점수 초기화 (같은 설정)</button>
    <button class="obtn" id="btnMenuNew">새 경기 설정으로</button>
    <a class="obtn ghost" style="text-align:center;text-decoration:none;display:block" href="../record/">📊 기록실 열기</a>
  </div>
</div>

<!-- ══ 목표 점수 변경 팝업 ══ -->
<div class="ovl" id="targetOvl">
  <div class="ovlcard" style="align-items:center">
    <h2 id="targetOvlTitle" style="margin-bottom:10px;">목표 점수</h2>
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:16px;">
      <button class="mbtn" id="btnTargetMinus" style="padding:16px 24px; font-size:1.5rem; background:#232a33; color:#fff; border:none; border-radius:12px;">−</button>
      <b id="tvalEdit" style="font-size:3rem; font-variant-numeric:tabular-nums; min-width:80px; text-align:center;">10</b>
      <button class="mbtn" id="btnTargetPlus" style="padding:16px 24px; font-size:1.5rem; background:#232a33; color:#fff; border:none; border-radius:12px;">+</button>
    </div>
    <button class="obtn primary" id="btnTargetClose">확인</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { sbFetch, sbAuth } from '../record/supabase.js';

const $ = s => document.querySelector(s);
const show = id => document.querySelectorAll('.screen').forEach(el => el.style.display = el.id === id ? 'flex' : 'none');
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e){ return d; } };
const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };

const LS_AUTH = 'dangScoreAuth', LS_PREFS = 'dangScorePrefs_v4', LS_MEM = 'dangScoreMem', LS_STATE = 'dangScoreState', LS_QUEUE = 'dangScoreQueue';
const MANUAL = '__MANUAL__';

let auth = lsGet(LS_AUTH, null);
let members = lsGet(LS_MEM, []);
let prefs = lsGet(LS_PREFS, { gameType:'2인', names:['','','',''], pids:[null,null,null,null], targets:[15,15,15,15], myBall:0 });
let S = lsGet(LS_STATE, null);

const ZCOLORS = ['w','y','w','y'];
const ZNAMES = ['⚪ 흰 공', '🟡 노란 공', '⚪ 흰 공', '🟡 노란 공'];
const TZNAMES = ['우리 팀', '상대 팀'];

const api = {
  members: () => sbFetch('/rest/v1/profiles?select=id,display_name,handicap&order=display_name'),
  myProfile: uid => sbFetch('/rest/v1/profiles?select=display_name&id=eq.' + uid),
  createProfile: (uid, name) => sbFetch('/rest/v1/profiles', { method: 'POST', body: JSON.stringify({ id: uid, display_name: name }) }),
  submitGame: payload => sbFetch('/rest/v1/games', { method: 'POST', body: JSON.stringify(payload) })
};

// ══ Auth ══
let authMode = 'login';
function setMode(m){ authMode = m; $('#tabLogin').className = m==='login'?'on':''; $('#tabSignup').className = m==='signup'?'on':''; $('#btnAuth').textContent = m==='login'?'로그인':'회원가입'; $('#aErr').textContent = ''; }
$('#tabLogin').onclick = () => setMode('login');
$('#tabSignup').onclick = () => setMode('signup');

$('#btnAuth').onclick = async () => {
  const btn = $('#btnAuth'), err = $('#aErr');
  const name = $('#aName').value.trim(), pass = $('#aPass').value;
  if (!name || pass.length < 6) return err.textContent = '이름과 6자 이상 비밀번호를 입력하세요';
  err.textContent = ''; btn.disabled = true;
  
  try {
    const a = await sbAuth(name, pass, authMode === 'signup');
    auth = { uid: a.uid, name, token: a.token, refresh: a.refresh };
    lsSet(LS_AUTH, auth);
    
    if (authMode === 'signup') {
      try { await api.createProfile(a.uid, name); }
      catch(e){
        auth = null; localStorage.removeItem(LS_AUTH);
        throw new Error(/duplicate|unique/i.test(e.message) ? '이미 쓰고 있는 이름이에요' : e.message);
      }
    } else {
      const p = await api.myProfile(a.uid);
      if (p && p[0]) { auth.name = p[0].display_name; lsSet(LS_AUTH, auth); }
    }
    await loadMembers();
    upsertMember(auth.uid, auth.name);
    queueFlush();
    show('setup');
    toast(`${auth.name}님, 환영합니다!`);
  } catch(e){
    err.textContent = translateAuthError(e.message);
  } finally {
    btn.disabled = false; setMode(authMode);
  }
};
function translateAuthError(m){
  if (/Invalid login/i.test(m)) return '이름 또는 비밀번호가 틀렸어요';
  if (/already registered/i.test(m)) return '이미 등록된 이름이에요. 로그인해 주세요';
  if (/Password should be/i.test(m)) return '비밀번호는 6자 이상이어야 해요';
  if (/rate limit/i.test(m)) return '요청이 너무 잦아요. 잠시 후 다시 시도해 주세요';
  if (/fetch|Network/i.test(m)) return '인터넷 연결을 확인해 주세요';
  return '문제가 발생했어요. 다시 시도해 주세요';
}
$('#btnGuest').onclick = () => { show('setup'); toast('게스트 모드 — 기록은 저장되지 않아요'); };

async function loadMembers(){ try { members = await api.members(); lsSet(LS_MEM, members); }catch(e){} }
function upsertMember(id, name){
  if (!id || !name) return;
  const i = members.findIndex(m => m.id === id);
  if (i >= 0) members[i].display_name = name;
  else members.push({ id, display_name:name });
  members.sort((a, b) => a.display_name.localeCompare(b.display_name, 'ko'));
  lsSet(LS_MEM, members);
}

function fillSelect(i, isUserAction = false){
  const sel = $('#sel'+i);
  if(!sel) return;
  const cur = prefs.pids[i];
  sel.innerHTML = '<option value="">선수 선택…</option>' +
    members.map(m => `<option value="${esc(m.id)}">${esc(m.display_name)}</option>`).join('') +
    `<option value="${MANUAL}">✏️ 직접 입력</option>`;
  sel.value = cur ? cur : (prefs.names[i] ? MANUAL : '');
  applySel(i, isUserAction);
}

function applySel(i, isUserAction){
  const sel = $('#sel'+i);
  if(!sel) return;
  const v = sel.value;
  const manual = (v === MANUAL);
  if($('#name'+i)) $('#name'+i).style.display = manual ? '' : 'none';
  if (manual) { prefs.pids[i] = null; }
  else if (v) {
    const m = members.find(x => x.id === v);
    prefs.pids[i] = v; prefs.names[i] = m ? m.display_name : '';
    if (isUserAction) {
      if (prefs.gameType === '팀전') {
        const teamIdx = i % 2;
        const p1 = prefs.pids[teamIdx];
        const p2 = prefs.pids[teamIdx + 2];
        const m1 = members.find(x => x.id === p1);
        const m2 = members.find(x => x.id === p2);
        let sum = 0, count = 0;
        if (m1 && m1.handicap != null) { sum += parseInt(m1.handicap, 10); count++; }
        if (m2 && m2.handicap != null) { sum += parseInt(m2.handicap, 10); count++; }
        if (count > 0) {
          prefs.targets[teamIdx] = Math.round(sum / count);
          if($('#tval'+teamIdx)) $('#tval'+teamIdx).textContent = prefs.targets[teamIdx];
        }
      } else if (m && m.handicap != null) {
        prefs.targets[i] = parseInt(m.handicap, 10);
        if($('#tval'+i)) $('#tval'+i).textContent = prefs.targets[i];
      }
    }
  } else { prefs.pids[i] = null; prefs.names[i] = ''; }
  lsSet(LS_PREFS, prefs);
}

// ══ Game Logic ══
let ts = null;
const toast = m => { const t = $('#toast'); t.textContent = m; t.classList.add('on'); clearTimeout(ts); ts = setTimeout(()=>t.classList.remove('on'), 2500); };
const vib = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch(e){} };
function save(){ lsSet(LS_STATE, S); }

let wl = null;
async function wakeLock(){ try { wl = await navigator.wakeLock.request('screen'); } catch(e){} }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { if (S) wakeLock(); queueFlush(); }
  else save();
});

function buildGameZones() {
  if (!S) return;
  const isTeam = S.type === '팀전';
  const N = S.sc.length;
  // append zones to #game but keep #mid
  let gameHtml = '';
  for(let i=0; i<N; i++){
    let zname = (S.names && S.names[i]) ? S.names[i] : 'Player';
    if (isTeam && S.names) {
      zname = `${i%2 === 0 ? 'A팀' : 'B팀'} ${S.names[i]}`;
    }
    let tgt = (S.targets && S.targets[i]) ? S.targets[i] : 15;
    
    gameHtml += `
      <div class="zone" id="zone${i}">
        <button class="minusbtn" id="mbtn${i}">-1</button>
        <span class="runbadge" id="run${i}">+0</span>
        <div class="zname"><span id="gball${i}"></span><span id="gname${i}">${zname}</span><span class="turnchip">치는 중</span></div>
        <div class="zscore" id="gsc${i}">0</div>
        <div class="ztarget" id="gtgt${i}">목표 ${tgt}</div>
        <div class="zstats" id="gstat${i}">에버 0.000 · 하이런 0</div>
      </div>
    `;
  }
  
  // insert zones into #gameZones
  $('#gameZones').innerHTML = gameHtml;
  
  
  
  for(let i=0; i<N; i++){
    $('#zone'+i).addEventListener('pointerdown', e => {
      if (e.target.closest('.minusbtn')) return;
      tapZone(i);
    });
    $('#zone'+i).addEventListener('contextmenu', e => e.preventDefault());
    $('#mbtn'+i).addEventListener('pointerdown', e => { e.stopPropagation(); undoScore(i); });
  }
  
  if ($('#btnUndo')) {
    $('#btnUndo').onclick = e => { e.stopPropagation(); undoTurn(); };
  }
}

function pushHist(){
  S.hist.push(JSON.stringify({
    sc:[...S.sc], indSc: S.indSc ? [...S.indSc] : [...S.sc],
    inn:[...S.inn], br:[...S.br], miss:[...S.miss],
    done:[...S.done], cush:[...S.cush], indCush: S.indCush ? [...S.indCush] : [...S.cush], cushInn:[...S.cushInn],
    finished:[...S.finished], round:S.round, lastInning:S.lastInning, winners:[...S.winners],
    tp:S.tp, turn:S.turn, first:S.first, tc:S.tc, fin:S.fin
  }));
}

function popScore(i){
  const el = $('#gsc'+i);
  if(!el) return;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function nextTurnIndex(current) {
  const N = S.sc.length;
  let next = (current + 1) % N;
  let checked = 0;
  while (S.finished[next] && checked < N) {
    next = (next + 1) % N;
    checked++;
  }
  return next;
}

function activePlayerCount() {
  return S.finished.filter(x => !x).length;
}

function tapZone(i){
  if (!S || S.fin || S.finished[i]) return;

  if (i === S.turn) {
    if (!S.done[i]) {
      pushHist();
      if (!S.indSc) S.indSc = [...S.sc];
      S.sc[i]++; S.indSc[i]++; S.tp++;
      if (S.type === '팀전' && S.sc.length === 4) S.sc[(i+2)%4]++;
      vib(12); popScore(i);
      if (S.sc[i] >= S.targets[i]) {
        S.done[i] = true;
        S.cushInn[i]++;
        if (S.type === '팀전' && S.sc.length === 4) { const p = (i+2)%4; S.done[p] = true; }
        toast(`🎯 마무리 쿠션!`);
      }
    } else if (S.cush[i] < S.round) {
      pushHist();
      if (!S.indCush) S.indCush = [...S.cush];
      S.cush[i]++; S.indCush[i]++; S.tp++;
      if (S.type === '팀전' && S.sc.length === 4) S.cush[(i+2)%4]++;
      vib(12); popScore(i);
      if (S.tp > S.br[i]) S.br[i] = S.tp;
      
      S.lastInning = true;
      if (!S.winners.includes(i)) S.winners.push(i);
      if (S.type === '팀전' && S.sc.length === 4) { if (!S.winners.includes((i+2)%4)) S.winners.push((i+2)%4); }
      toast(`🎯 목표 달성!`);
      
      passTurnInner(false);
    } else {
      vib(8);
    }
  } else {
    passTurnInner(true);
  }
  save(); render();
}

function passTurnInner(isMiss) {
  pushHist();
  if (S.tp > S.br[S.turn]) S.br[S.turn] = S.tp;
  if (isMiss && S.tp === 0) S.miss[S.turn]++;
  
  S.inn[S.turn]++; S.tp = 0;
  if (S.done[S.turn]) S.cushInn[S.turn]++;
  
  const prevTurn = S.turn;
  const next = nextTurnIndex(S.turn);
  S.turn = next;
  S.tc++;
  vib(25);
  
  const isTeam = S.type === '팀전' && S.sc.length === 4;
  const is2p = S.sc.length === 2;

  let inningEnded = false;
  if (isTeam || is2p) {
    const teamOf = i => isTeam ? (i % 2) : i;
    if (teamOf(prevTurn) !== teamOf(S.first)) inningEnded = true;
  } else {
    const activeInns = S.inn.filter((_, idx) => !S.finished[idx]);
    if (activeInns.length > 0 && activeInns.every(v => v === activeInns[0])) {
      inningEnded = true;
    }
  }

  if (inningEnded && S.lastInning) {
    endInning();
  }
}

window.passTurn = function(){
  if (!S || S.fin || S.finished[S.turn]) return;
  passTurnInner(true);
  save(); render();
};

function endInning() {
  const isTeam = S.type === '팀전' && S.sc.length === 4;
  const is2p = S.sc.length === 2;

  if (S.winners.length > 0) {
    if (isTeam || is2p) {
      const teamWins = new Set(S.winners.map(i => isTeam ? (i%2) : i));
      if (teamWins.size === 2) {
        S.round++;
        S.lastInning = false;
        S.winners = [];
        S.cushInn[S.first]++;
        vib([40,40,40]);
        toast(`동점! 마무리 쿠션 ${S.round} — 연장`);
        return;
      }
      save(); render(); return win(S.winners[0]);
    } else {
      save(); render(); return win(S.winners[0]);
    }
  }
}

window.undoTurn = function(){
  if (!S || !S.hist.length) return;
  try {
    const h = JSON.parse(S.hist.pop());
    Object.assign(S, h);
    vib(15); save(); render();
  } catch(e){}
};

window.undoScore = function(i){
  if (!S || S.fin || i !== S.turn || S.tp === 0) return;
  pushHist();
  if (S.done[i] && S.cush[i] === 0) {
    S.done[i] = false; S.cushInn[i]--; S.sc[i]--; if(S.indSc) S.indSc[i]--; S.tp--;
  } else if (S.done[i] && S.cush[i] > 0) {
    S.cush[i]--; if(S.indCush) S.indCush[i]--; S.tp--;
    if (S.cush[i] < S.round) {
      S.lastInning = false;
      S.winners = S.winners.filter(x => x !== i && x !== ((i+2)%4));
    }
  } else {
    S.sc[i]--; if(S.indSc) S.indSc[i]--; S.tp--;
  }
  
  if (S.type === '팀전' && S.sc.length === 4) {
    const p = (i+2)%4;
    S.sc[p] = S.sc[i]; S.done[p] = S.done[i]; S.cush[p] = S.cush[i];
  }
  vib(15); popScore(i);
  save(); render();
};

function render(){
  if (!S) return;
  const isTeam = S.type === '팀전';
  const N = S.sc.length;
  for(let i=0; i<N; i++) {
    const el = $('#zone'+i);
    if(!el) continue;
    
    el.classList.toggle('on', S.turn === i && !S.fin && !S.finished[i]);
    el.classList.toggle('off', (S.turn !== i || S.fin) && !S.finished[i]);
    if (S.finished[i]) {
      el.style.opacity = '0.3';
      el.classList.add('off');
    } else {
      el.style.opacity = '1';
    }
    
    // 계산: 이 선수가 칠 때의 절대 턴수(tc)
    let expectedTc = S.tc;
    if (!S.finished[i]) {
      let curr = S.turn;
      while (curr !== i) {
        curr = (curr + 1) % N;
        if (!S.finished[curr]) expectedTc++;
      }
    }
    const isWhite = (expectedTc % 2 === 0);
    el.classList.toggle('w', isWhite);
    el.classList.toggle('y', !isWhite);
    
    const ballSpan = $('#gball'+i);
    if (ballSpan) {
      ballSpan.textContent = isWhite ? '⚪ ' : '🟡 ';
      ballSpan.style.marginRight = '4px';
    }
    
    if (S.done[i]) {
      $('#gtgt'+i).textContent = `마무리 ${S.cush[i]}/${S.round}`;
      $('#gsc'+i).textContent = '쿠션';
      $('#gsc'+i).style.fontSize = 'clamp(40px, 15vmin, 100px)';
    } else {
      $('#gtgt'+i).textContent = `목표 ${S.targets[i]}`;
      $('#gsc'+i).textContent = S.sc[i];
      $('#gsc'+i).style.fontSize = 'clamp(64px, 22vmin, 150px)';
    }
    
    const ev = S.inn[i] ? (S.sc[i] / S.inn[i]).toFixed(3) : '0.000';
    $('#gstat'+i).textContent = `에버 ${ev} · 하이런 ${S.br[i]}`;
    
    if (S.turn === i && S.tp > 0) {
      $('#run'+i).textContent = '+' + S.tp;
      $('#run'+i).classList.add('show');
    } else {
      $('#run'+i).classList.remove('show');
    }
  }
  
  if ($('#inning')) {
    if (S.lastInning) $('#inning').textContent = '⏳ 후구';
    else if (S.round > 1) $('#inning').textContent = `🔥 쿠션 ${S.round}`;
    else $('#inning').textContent = `${Math.max(...S.inn) + 1} 이닝`;
  }
}

// ══ Win / Menu ══
function win(winnerIdx){
  S.fin = true; save();
  $('#winOvl').classList.add('on');
  
  const isTeam = S.type === '팀전';
  const N = S.sc.length;
  let isTie = false;
  if (isTeam && N === 4) {
    const teamWins = new Set(S.winners.map(i => i%2));
    isTie = teamWins.size > 1;
  } else {
    isTie = S.winners.length > 1;
  }
  let title = isTie ? '공동 목표 달성!' : `${isTeam ? TZNAMES[S.winners[0]%2] : S.names[S.winners[0]]} 승리!`;
  $('#winTitle').textContent = title;
  
  let html = '<tr><th>선수</th><th>점수</th><th>에버</th><th>하이런</th></tr>';
  for(let i=0; i<N; i++){
    const nm = isTeam ? TZNAMES[i] : S.names[i];
    const scStr = S.done[i] ? `쿠션 ${S.cush[i]}/${S.round}` : `${S.sc[i]}/${S.targets[i]}`;
    const ev = S.inn[i] ? (S.sc[i]/S.inn[i]).toFixed(3) : '0.000';
    html += `<tr><td>${nm}</td><td>${scStr}</td><td>${ev}</td><td>${S.br[i]}</td></tr>`;
  }
  $('#winStats').innerHTML = html;
  
  if (!S.saved) {
    if (auth) {
      $('#saveStat').className = 'savestat'; $('#saveStat').textContent = '서버에 기록 저장 중...';
      const pl = [];
      for(let i=0; i<N; i++){
        const isWin = S.winners.includes(i);
        pl.push({
          id: S.pids[i] || null, name: S.names[i], win: isWin,
          score: S.indSc ? S.indSc[i] : S.sc[i], target: S.targets[i], innings: S.inn[i],
          highRun: S.br[i], misses: S.miss[i], cushMade: S.indCush ? S.indCush[i] : S.cush[i],
          cushInn: S.cushInn[i], isTeam: isTeam
        });
      }
      
      const payload = { recorded_by: auth.uid, played_at: new Date(S.t0).toISOString(), players: pl };
      api.submitGame(payload).then(() => {
        S.saved = true; save();
        $('#saveStat').className = 'savestat ok'; $('#saveStat').textContent = '기록 저장 완료 ✓';
      }).catch(e => {
        queueAdd(payload); S.saved = true; save();
        $('#saveStat').className = 'savestat warn'; $('#saveStat').textContent = '오프라인: 나중에 저장됩니다';
        alert("저장 에러: " + (e.message || e));
      });
    } else {
      S.saved = true; save();
      $('#saveStat').className = 'savestat'; $('#saveStat').textContent = '게스트 모드: 기록이 저장되지 않습니다';
    }
  }
}

$('#btnWinNew').onclick = () => {
  $('#winOvl').classList.remove('on'); S = null; save(); show('setup');
};

$('#btnWinCont').onclick = () => {
  $('#winOvl').classList.remove('on');
  S.winners.forEach(w => S.finished[w] = true);
  S.winners = [];
  S.lastInning = false;
  S.fin = false;
  
  if (activePlayerCount() <= 1) {
    toast('더 이상 진행할 선수가 없습니다.');
    S.fin = true; save(); return;
  }
  
  // Set turn to the next non-finished player if current is finished
  if (S.finished[S.turn]) S.turn = nextTurnIndex(S.turn);
  save(); render();
};

$('#btnWinUndo').onclick = () => {
  $('#winOvl').classList.remove('on');
  S.fin = false; S.saved = false;
  undoTurn();
};

$('#btnMenu').onclick = () => $('#menuOvl').classList.add('on');
$('#btnMenuClose').onclick = () => $('#menuOvl').classList.remove('on');
$('#btnMenuNew').onclick = () => {
  if(confirm('진행 중인 경기가 사라집니다. 새 경기를 설정할까요?')){
    $('#menuOvl').classList.remove('on'); S = null; save(); show('setup');
  }
};
$('#btnMenuRestart').onclick = () => {
  if(confirm('점수를 모두 0으로 초기화할까요?')){
    $('#menuOvl').classList.remove('on');
    const N = S.sc.length;
    Object.assign(S, { sc:Array(N).fill(0), inn:Array(N).fill(0), br:Array(N).fill(0), miss:Array(N).fill(0),
                       done:Array(N).fill(false), cush:Array(N).fill(0), cushInn:Array(N).fill(0),
                       finished:Array(N).fill(false), round:1, lastInning:false, winners:[],
                       tp:0, turn:S.first, tc:0, hist:[], fin:false, saved:false, t0:Date.now() });
    save(); buildGameZones(); render(); toast('점수가 초기화되었습니다.');
  }
};
document.querySelectorAll('.ovl').forEach(o => o.addEventListener('pointerdown', e => { if (e.target === o) o.classList.remove('on'); }));
$('#targetOvl').addEventListener('pointerdown', e => { if (e.target === $('#targetOvl')) $('#targetOvl').classList.remove('on'); });
$('#btnTargetClose').onclick = () => $('#targetOvl').classList.remove('on');

// ══ Queue & Init ══
function queueAdd(p){ const q = lsGet(LS_QUEUE, []); q.push(p); lsSet(LS_QUEUE, q); }
async function queueFlush(){
  if (!navigator.onLine) return;
  let q = lsGet(LS_QUEUE, []);
  if (!q.length) return;
  let newQ = [];
  let sent = 0;
  for (const p of q) {
    try {
      await api.submitGame(p);
      sent++;
    } catch(e) {
      if (e.message && e.message.includes('fetch error')) {
        // network error, keep in queue
        newQ.push(p);
      } else if (e.message && e.message.includes('Failed to fetch')) {
        newQ.push(p);
      } else {
        // likely 4xx bad request from supabase, discard to prevent blocking
        console.error('Discarding bad payload', e);
      }
    }
  }
  lsSet(LS_QUEUE, newQ);
  if (sent > 0) toast(`오프라인 기록 ${sent}건 동기화 완료!`);
}

function init(){
  const tk = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
  if (tk) { window.location.hash = ''; return toast('로그인 처리되었습니다. 앱을 다시 열어주세요.'); }
  if (auth) { setMode('login'); $('#aName').value = auth.name; loadMembers().then(()=>queueFlush()); }
  else { setMode('login'); show('auth'); }

  // 구버전 상태 마이그레이션: finished 배열이 없으면 추가
  if (S && S.sc) {
    if (!Array.isArray(S.finished)) {
      const N = S.sc.length;
      S.finished = Array(N).fill(false);
      S.winners = S.winners || [];
      S.lastInning = S.lastInning || false;
      S.round = S.round || 1;
      if (!S.type) S.type = '2인';
    }
    if (typeof S.tc !== 'number') {
      S.tc = S.inn.reduce((a, b) => a + b, 0);
    }
    save();
  }

  if (S && S.sc && !S.fin) {
    buildGameZones(); render(); show('game'); queueFlush();
  } else if (auth) {
    syncSetup(); show('setup');
  }
}
window.addEventListener('online', queueFlush);
init();

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.getRegistrations().then(regs => {
    for(let r of regs) {
      if(r.scope !== location.origin + '/Dangdong/') r.unregister();
    }
  });
  navigator.serviceWorker.register('../sw.js').catch(()=>{});
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}
</script>
