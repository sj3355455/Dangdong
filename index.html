<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>당동 기록실</title>
<style>
:root{
  --bg:#f6f7f9; --card:#fff; --text:#1a1d21; --muted:#6b7280;
  --line:#e5e7eb; --accent:#e8590c; --hover:#f0f2f5;
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#15181c; --card:#1e2228; --text:#e8eaed; --muted:#9aa1ab;
         --line:#2f343c; --accent:#ff8c42; --hover:#262b33; }
}
*{box-sizing:border-box}
body{margin:0;padding:16px;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  line-height:1.5;}
.wrap{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;margin:0 0 4px}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:20px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1px solid var(--line);background:var(--card);
  color:var(--text);border-radius:999px;cursor:pointer;font-size:.9rem}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:16px;margin-bottom:16px}
.scroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:.88rem;white-space:nowrap}
th,td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--line)}
th{cursor:pointer;user-select:none;color:var(--muted);font-weight:600;
  position:sticky;top:0;background:var(--card)}
th:hover{color:var(--accent)}
th .ar{opacity:.35;font-size:.7rem}
th.on{color:var(--accent)} th.on .ar{opacity:1}
td.name,th.name{text-align:left}
tbody tr:hover{background:var(--hover)}
.rk{width:34px;color:var(--muted)}
a.pl{color:var(--text);text-decoration:none;font-weight:600;border-bottom:1px dashed var(--muted);cursor:pointer}
a.pl:hover{color:var(--accent);border-color:var(--accent)}
.win{color:var(--accent);font-weight:600}
.back{background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:.9rem;padding:0;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin:14px 0}
.st{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.st .k{font-size:.72rem;color:var(--muted)}
.st .v{font-size:1.15rem;font-weight:700;margin-top:2px}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:.9rem}
.chead{display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;margin:18px 0 4px}
.mbtns{display:flex;gap:4px}
.mbtn{padding:5px 12px;border:1px solid var(--line);background:var(--card);
  color:var(--muted);border-radius:999px;cursor:pointer;font-size:.8rem}
.mbtn:hover{color:var(--accent);border-color:var(--accent)}
.mbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
/* 그래프는 폭을 px 로 직접 지정한다(스크롤 가능해야 하므로 width:100% 금지) */
.cscroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.cscroll svg{display:block;width:auto;max-width:none}
.chint{color:var(--muted);font-size:.75rem;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎱 당동 기록실</h1>
  <div class="sub" id="sub"></div>
  <div class="tabs">
    <button class="tab on" data-v="rank">🏆 순위</button>
    <button class="tab" data-v="games">🕒 경기</button>
  </div>
  <div id="view"></div>
</div>
<script>
const DATA = {"updated":"2026-07-17 01:20","players":[{"name":"황서진","handicap":250,"games":5,"wins":1,"winRate":20.0,"adjRate":28.333333333333332,"avgAvg":2.8178,"bestAvg":7.0,"bestHr":16,"hitRate":40.816326530612244,"cushRate":100.0,"history":[{"date":"2026-07-16","opponents":"박지원","score":21,"inning":3,"miss":1,"average":7.0,"highRun":16,"win":true},{"date":"2026-07-16","opponents":"최민규, 박지원","score":4,"inning":3,"miss":1,"average":1.333,"highRun":3,"win":false},{"date":"2026-07-16","opponents":"박지원, 최민규, 김준서","score":22,"inning":9,"miss":3,"average":2.444,"highRun":8,"win":false},{"date":"2026-07-16","opponents":"김준서, 박지원","score":8,"inning":3,"miss":0,"average":2.667,"highRun":4,"win":false},{"date":"2026-07-16","opponents":"박지원","score":20,"inning":31,"miss":24,"average":0.645,"highRun":6,"win":false}]},{"name":"박지원","handicap":150,"games":5,"wins":3,"winRate":60.0,"adjRate":56.666666666666664,"avgAvg":1.7254,"bestAvg":5.333,"bestHr":9,"hitRate":38.297872340425535,"cushRate":50.0,"history":[{"date":"2026-07-16","opponents":"황서진","score":2,"inning":2,"miss":1,"average":1.0,"highRun":2,"win":false},{"date":"2026-07-16","opponents":"황서진, 최민규","score":0,"inning":2,"miss":2,"average":0.0,"highRun":0,"win":false},{"date":"2026-07-16","opponents":"황서진, 최민규, 김준서","score":16,"inning":9,"miss":2,"average":1.778,"highRun":4,"win":true},{"date":"2026-07-16","opponents":"황서진, 김준서","score":16,"inning":3,"miss":0,"average":5.333,"highRun":9,"win":true},{"date":"2026-07-16","opponents":"황서진","score":16,"inning":31,"miss":24,"average":0.516,"highRun":6,"win":true}]},{"name":"최민규","handicap":80,"games":2,"wins":2,"winRate":100.0,"adjRate":91.66666666666667,"avgAvg":2.0,"bestAvg":3.0,"bestHr":8,"hitRate":66.66666666666666,"cushRate":66.66666666666666,"history":[{"date":"2026-07-16","opponents":"황서진, 박지원","score":9,"inning":3,"miss":2,"average":3.0,"highRun":8,"win":true},{"date":"2026-07-16","opponents":"황서진, 박지원, 김준서","score":9,"inning":9,"miss":2,"average":1.0,"highRun":2,"win":true}]},{"name":"김준서","handicap":80,"games":2,"wins":1,"winRate":50.0,"adjRate":45.83333333333333,"avgAvg":2.0,"bestAvg":3.0,"bestHr":4,"hitRate":72.72727272727273,"cushRate":33.33333333333333,"history":[{"date":"2026-07-16","opponents":"황서진, 박지원, 최민규","score":8,"inning":8,"miss":3,"average":1.0,"highRun":3,"win":false},{"date":"2026-07-16","opponents":"황서진, 박지원","score":9,"inning":3,"miss":0,"average":3.0,"highRun":4,"win":true}]}],"games":[{"date":"2026-07-16","datetime":"2026-07-16 10:43:32","type":"4B","name":"4구 2인","players":[{"name":"황서진","ranking":1},{"name":"박지원","ranking":2}]},{"date":"2026-07-16","datetime":"2026-07-16 10:52:13","type":"4B","name":"4구 3인","players":[{"name":"황서진","ranking":2},{"name":"최민규","ranking":1},{"name":"박지원","ranking":2}]},{"date":"2026-07-16","datetime":"2026-07-16 11:26:16","type":"4B","name":"4구 4인","players":[{"name":"황서진","ranking":2},{"name":"박지원","ranking":1},{"name":"최민규","ranking":1},{"name":"김준서","ranking":2}]},{"date":"2026-07-16","datetime":"2026-07-16 11:29:20","type":"4B","name":"4구 3인","players":[{"name":"황서진","ranking":2},{"name":"김준서","ranking":1},{"name":"박지원","ranking":1}]},{"date":"2026-07-16","datetime":"2026-07-16 18:48:51","type":"4B","name":"4구 2인","players":[{"name":"황서진","ranking":2},{"name":"박지원","ranking":1}]}]};
const $ = (h) => { const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; };
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

document.getElementById('sub').textContent =
  `최종 업데이트 ${DATA.updated} · 총 ${DATA.games.length}경기 · 선수 ${DATA.players.length}명`;

const COLS = [
  {k:'name',     t:'이름',    txt:1},
  {k:'handicap', t:'수지'},
  {k:'games',    t:'경기'},
  {k:'wins',     t:'승'},
  {k:'winRate',  t:'승률',    fmt:v=>v.toFixed(0)+'%'},
  {k:'adjRate',  t:'보정 승률', fmt:v=>v.toFixed(1)+'%'},
  {k:'avgAvg',   t:'에버리지', fmt:v=>v.toFixed(3)},
  {k:'cushRate', t:'쿠션 성공률', fmt:v=>v.toFixed(1)+'%'},
  {k:'hitRate',  t:'득점률',  fmt:v=>v.toFixed(1)+'%'},
  {k:'bestHr',   t:'하이런'},
];
// 기록 없음(null)은 '—'. 쿠션을 한 번도 못 쳐본 선수가 있을 수 있다.
const cell = (p, c) => p[c.k]==null ? '—' : (c.fmt ? c.fmt(p[c.k]) : p[c.k]);
let sortKey='winRate', sortAsc=false;

function renderRank(){
  const rows = [...DATA.players].sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey], r;
    // 기록 없음은 정렬 방향과 무관하게 항상 맨 뒤
    if(x==null && y==null) return 0;
    if(x==null) return 1;
    if(y==null) return -1;
    if(typeof x==='string') r = x.localeCompare(y,'ko');
    else r = x-y;
    if(r===0) r = b.avgAvg-a.avgAvg;
    return sortAsc ? r : -r;
  });
  const head = COLS.map(c=>{
    const on = c.k===sortKey;
    const ar = on ? (sortAsc?'▲':'▼') : '↕';
    return `<th class="${on?'on':''} ${c.txt?'name':''}" data-k="${c.k}">${c.t} <span class="ar">${ar}</span></th>`;
  }).join('');
  const body = rows.map((p,i)=>{
    const medal = ['🥇','🥈','🥉'][i] || (i+1);
    const tds = COLS.map(c=>{
      if(c.k==='name') return `<td class="name"><a class="pl" data-p="${esc(p.name)}">${esc(p.name)}</a></td>`;
      return `<td>${cell(p, c)}</td>`;
    }).join('');
    return `<tr><td class="rk">${medal}</td>${tds}</tr>`;
  }).join('');
  const el = $(`<div class="card"><div class="scroll"><table>
      <thead><tr><th class="rk"></th>${head}</tr></thead><tbody>${body}</tbody></table></div>
      <div class="sub" style="margin:10px 0 0">표 제목을 누르면 그 기준으로 정렬됩니다.<br>
        <b>보정 승률</b>: 인원수가 다른 경기를 공평하게 비교한 값. 그 판에서 내가 제친 사람
        비율의 평균이라, 4인전에서 진 것(33%)이 2인전에서 진 것(0%)보다 덜 깎입니다.
        <b>50%가 평균</b>이고, 높을수록 잘한 것.</div></div>`);
  el.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{
    const k = th.dataset.k;
    if(k===sortKey) sortAsc=!sortAsc; else { sortKey=k; sortAsc = (k==='name'); }
    show('rank');
  });
  el.querySelectorAll('a.pl').forEach(a=>a.onclick=()=>showPlayer(a.dataset.p));
  return el;
}

// viewBox 를 컨테이너 실제 픽셀 폭에 맞춘다.
// 고정폭(예: 680)으로 두면 폰에서 SVG 전체가 축소되며 글자까지 같이 작아진다.
function chart(vals, labels, opt){
  opt = opt || {};
  if(vals.length<2) return '<div class="empty">경기 2개 이상부터 그래프가 표시됩니다</div>';
  const dec = opt.dec==null ? 2 : opt.dec;
  const suf = opt.suffix || '';
  const fmt = v => (+v.toFixed(dec)) + suf;

  const availW = Math.max(260, Math.round(opt.W || 680));
  // 좁은 화면일수록 세로로 길게 — 세로로 긴 폰 화면을 채우도록
  const H = opt.H || (availW < 420 ? 300 : availW < 560 ? 270 : 240);
  const P = {t:20, r:14, b:34, l:44};

  // 점마다 최소 간격을 보장한다. 경기가 쌓여 화면 폭을 넘으면 가로로 스크롤.
  const MIN_GAP = 46;
  const needW = P.l + P.r + MIN_GAP*(vals.length-1);
  const W = Math.max(availW, needW);

  const iw=W-P.l-P.r, ih=H-P.t-P.b;
  const max = opt.max || (Math.max(...vals)*1.15 || 1);
  const x = i => P.l + (vals.length===1?iw/2:iw*i/(vals.length-1));
  const y = v => P.t + ih - (v/max)*ih;

  const gap = iw/(vals.length-1);      // 점 사이 간격(px)
  const showVal = gap >= 36;           // 좁으면 점 위 숫자 생략 (겹침 방지)
  const xStep = Math.max(1, Math.ceil(34/gap));

  let g='';
  for(let i=0;i<=4;i++){
    const yy=P.t+ih*i/4, v=(max*(4-i)/4);
    g+=`<line x1="${P.l}" y1="${yy}" x2="${W-P.r}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>`;
    g+=`<text x="${P.l-8}" y="${yy+4}" fill="var(--muted)" font-size="11" text-anchor="end">${fmt(v)}</text>`;
  }
  const pts = vals.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const dots = vals.map((v,i)=>{
    const c = `<circle cx="${x(i)}" cy="${y(v)}" r="${showVal?4:3}" fill="var(--accent)"/>`;
    if(!showVal) return c;
    return c + `<text x="${x(i)}" y="${y(v)-10}" fill="var(--text)" font-size="11" text-anchor="middle">${fmt(v)}</text>`;
  }).join('');
  const xs = labels.map((l,i)=> i%xStep===0 ?
    `<text x="${x(i)}" y="${H-12}" fill="var(--muted)" font-size="10" text-anchor="middle">${esc(l)}</text>`:'').join('');
  return `<div class="cscroll"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">${g}
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5"
      stroke-linejoin="round" stroke-linecap="round"/>${dots}${xs}</svg></div>`;
}

// 추이 그래프에서 전환 가능한 지표들
const METRICS = [
  {k:'avg', t:'에버리지', desc:'경기별 에버리지',
   vals:h=>h.map(r=>r.average), dec:2},
  {k:'hit', t:'득점률',   desc:'경기별 득점률 (공타가 아닌 이닝 비율)',
   vals:h=>h.map(r=>r.inning ? (r.inning-r.miss)/r.inning*100 : 0), max:100, suffix:'%', dec:0},
  {k:'win', t:'승률',     desc:'그 경기까지의 누적 승률',
   vals:h=>{let w=0; return h.map((r,i)=>{ if(r.win) w++; return w/(i+1)*100; });}, max:100, suffix:'%', dec:0},
];

function showPlayer(name){
  const p = DATA.players.find(v=>v.name===name);
  const h = [...p.history];
  const el = $(`<div>
    <button class="back">← 순위로</button>
    <div class="card">
      <h2 style="margin:0">${esc(p.name)}</h2>
      <div class="sub" style="margin:2px 0 0">수지 ${p.handicap}</div>
      <div class="stats">
        <div class="st"><div class="k">경기</div><div class="v">${p.games}</div></div>
        <div class="st"><div class="k">승 / 패</div><div class="v">${p.wins} / ${p.games-p.wins}</div></div>
        <div class="st"><div class="k">승률</div><div class="v">${p.winRate.toFixed(0)}%</div></div>
        <div class="st"><div class="k">보정 승률</div><div class="v">${p.adjRate==null?'—':p.adjRate.toFixed(1)+'%'}</div></div>
        <div class="st"><div class="k">에버리지</div><div class="v">${p.avgAvg.toFixed(3)}</div></div>
        <div class="st"><div class="k">쿠션 성공률</div><div class="v">${p.cushRate==null?'—':p.cushRate.toFixed(1)+'%'}</div></div>
        <div class="st"><div class="k">득점률</div><div class="v">${p.hitRate.toFixed(1)}%</div></div>
        <div class="st"><div class="k">하이런</div><div class="v">${p.bestHr}</div></div>
      </div>
      <div class="chead">
        <h3 style="font-size:1rem;margin:0">📈 추이</h3>
        <div class="mbtns">${METRICS.map((m,i)=>
          `<button class="mbtn${i===0?' on':''}" data-m="${m.k}">${m.t}</button>`).join('')}</div>
      </div>
      <div class="sub" id="cdesc" style="margin:0 0 6px"></div>
      <div id="cbox"></div>
    </div>
    <div class="card"><h3 style="font-size:1rem;margin:0 0 10px">🗒️ 경기 이력</h3>
      <div class="scroll"><table>
        <thead><tr><th class="name">날짜</th><th class="name">상대</th><th>점수</th>
          <th>이닝</th><th>에버</th><th>하이런</th><th>결과</th></tr></thead>
        <tbody>${[...h].reverse().map(r=>`<tr>
          <td class="name">${esc(r.date)}</td><td class="name">${esc(r.opponents)}</td>
          <td>${r.score}</td><td>${r.inning}</td><td>${+r.average.toFixed(3)}</td>
          <td>${r.highRun}</td><td>${r.win?'<span class="win">🏆</span>':'—'}</td></tr>`).join('')}
        </tbody></table></div></div>
  </div>`);
  el.querySelector('.back').onclick=()=>show('rank');

  const labels = h.map(r=>r.date.slice(5));
  let cur = 'avg', lastW = 0;
  const draw = (key) => {
    cur = key;
    const m = METRICS.find(v=>v.k===key);
    const box = el.querySelector('#cbox');
    // 컨테이너 실제 폭을 재서 그린다 (없으면 화면 폭으로 추정)
    lastW = box.clientWidth || innerWidth-64;
    box.innerHTML = chart(m.vals(h), labels, {...m, W: lastW});
    el.querySelector('#cdesc').textContent = m.desc;
    el.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('on', b.dataset.m===key));
    // 그래프가 화면보다 넓으면 최신 경기(오른쪽 끝)부터 보여준다
    const sc = box.querySelector('.cscroll');
    if(sc && sc.scrollWidth > sc.clientWidth){
      sc.scrollLeft = sc.scrollWidth;
      box.insertAdjacentHTML('beforeend',
        '<div class="chint">← 옆으로 밀면 지난 경기를 볼 수 있어요</div>');
    }
  };
  el.querySelectorAll('.mbtn').forEach(b=>b.onclick=()=>draw(b.dataset.m));

  document.getElementById('view').replaceChildren(el);
  draw('avg');                       // DOM 삽입 후 그려야 clientWidth 가 잡힌다

  // 그래프 폭이 바뀌면 다시 그린다. 두 가지를 함께 쓴다:
  //  - ResizeObserver: 창 크기가 그대로인 레이아웃 변화까지 잡음
  //  - resize/orientationchange: RO 가 막히는 환경을 위한 폴백
  chartRedraw = () => { const box = el.querySelector('#cbox');
                        if(box && Math.abs(box.clientWidth - lastW) > 2) draw(cur); };
  if(chartRO) chartRO.disconnect();
  chartRO = new ResizeObserver(es=>{
    const w = es[0].contentRect.width;
    if(Math.abs(w - lastW) > 2) draw(cur);   // 폭이 실제로 변했을 때만 (재귀 방지)
  });
  chartRO.observe(el.querySelector('#cbox'));
  scrollTo(0,0);
}

function renderGames(){
  const rows = [...DATA.games].sort((a,b)=>b.datetime.localeCompare(a.datetime)).map(g=>{
    const win = g.players.filter(p=>p.ranking===1).map(p=>p.name).join(', ');
    const all = g.players.map(p=>p.name).join(', ');
    return `<tr><td class="name">${esc(g.date)}</td><td class="name">${esc(g.name||g.type)}</td>
      <td class="name">${esc(all)}</td><td class="name win">🏆 ${esc(win)}</td></tr>`;
  }).join('');
  return $(`<div class="card"><div class="scroll"><table>
    <thead><tr><th class="name">날짜</th><th class="name">경기</th>
      <th class="name">참가자</th><th class="name">우승</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`);
}

let chartRO = null, chartRedraw = null, chartRT = null;   // 선수 상세 그래프 폭 감시

function show(v){
  if(chartRO){ chartRO.disconnect(); chartRO = null; }   // 상세를 떠나면 감시 해제
  chartRedraw = null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.v===v));
  document.getElementById('view').replaceChildren(v==='rank' ? renderRank() : renderGames());
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>show(t.dataset.v));

const kick = (ms) => { clearTimeout(chartRT);
  chartRT = setTimeout(()=>{ if(chartRedraw) chartRedraw(); }, ms); };
addEventListener('resize', ()=>kick(150));
addEventListener('orientationchange', ()=>kick(250));   // 폰 회전

show('rank');
</script>
</body>
</html>
