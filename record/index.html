<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>당동 기록실</title>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#f6f7f9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="당동 기록실">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="icon" type="image/png" href="../icon-192.png">
<style>
:root{
  --sat: env(safe-area-inset-top,0px); --sab: env(safe-area-inset-bottom,0px);
  --bg:#f6f7f9; --card:#fff; --text:#1a1d21; --muted:#6b7280;
  --line:#e5e7eb; --accent:#e8590c; --hover:#f0f2f5;
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#15181c; --card:#1e2228; --text:#e8eaed; --muted:#9aa1ab;
         --line:#2f343c; --accent:#ff8c42; --hover:#262b33; }
}
*{box-sizing:border-box}
body{margin:0;padding:calc(56px + var(--sat)) 16px calc(16px + var(--sab));background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  line-height:1.5;}
.wrap{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;margin:0 0 4px}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:20px}
.nav-toggle{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px;width:100%;max-width:420px;margin-left:auto;margin-right:auto}
.nav-btn{flex:1;text-align:center;padding:10px 0;text-decoration:none;color:var(--muted);font-weight:600;font-size:.95rem;border-radius:8px;transition:all .2s}
.nav-btn.on{background:var(--accent);color:#fff}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.tab{padding:8px 16px;border:1px solid var(--line);background:var(--card);
  color:var(--text);border-radius:999px;cursor:pointer;font-size:.9rem}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.field{width:100%;background:#12161b;border:1px solid var(--line);color:#fff;
  padding:12px;border-radius:8px;outline:none;transition:border-color .2s;font-size:1rem;margin-bottom:12px;}
.field:focus{border-color:var(--accent)}
.bigbtn{width:100%;max-width:420px;padding:15px 0;border-radius:14px;background:var(--accent);
  color:#fff;border:none;font-weight:bold;font-size:1.1rem;cursor:pointer;transition:transform .1s}
.bigbtn:active{filter:brightness(.9)}
.bigbtn:disabled{opacity:.5;cursor:not-allowed;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:16px;margin-bottom:16px}
.scroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:.88rem;white-space:nowrap}
th,td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--line)}
th{cursor:pointer;user-select:none;color:var(--muted);font-weight:600;
  position:sticky;top:0;background:var(--card)}
th:hover{color:var(--accent)}
th .ar{opacity:.35;font-size:.7rem}
th.on{color:var(--accent)} th.on .ar{opacity:1}
td.name,th.name{text-align:left}
tbody tr:hover{background:var(--hover)}
.rk{width:34px;color:var(--muted)}
a.pl{color:var(--text);text-decoration:none;font-weight:600;border-bottom:1px dashed var(--muted);cursor:pointer}
a.pl:hover{color:var(--accent);border-color:var(--accent)}
.win{color:var(--accent);font-weight:600}
.back{background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:.9rem;padding:0;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin:14px 0}
.st{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.st .k{font-size:.72rem;color:var(--muted)}
.st .v{font-size:1.15rem;font-weight:700;margin-top:2px}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:.9rem}
.chead{display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;margin:18px 0 4px}
.mbtns{display:flex;gap:4px}
.mbtn{padding:5px 12px;border:1px solid var(--line);background:var(--card);
  color:var(--muted);border-radius:999px;cursor:pointer;font-size:.8rem}
.mbtn:hover{color:var(--accent);border-color:var(--accent)}
.mbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
/* 그래프는 폭을 px 로 직접 지정한다(스크롤 가능해야 하므로 width:100% 금지) */
.cscroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div class="wrap">
  <h1 style="margin:0 0 8px 0; font-size:1.6rem; text-align:center; position:relative;">
    🎱 당동 기록실
    <button onclick="location.href = location.href.split('?')[0] + '?_t=' + Date.now()" style="position:absolute; right:0; top:0; background:none; border:none; font-size:1.2rem; cursor:pointer;" title="새로고침">🔄</button>
  </h1>
  <div class="sub" id="sub" style="text-align:center; margin-bottom:16px;"></div>
  
  <div class="nav-toggle">
    <a href="../score/" class="nav-btn">🎱 점수판</a>
    <a href="../record/" class="nav-btn on">📊 기록실</a>
  </div>
  
  <div class="tabs" style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
    <div style="display:flex; gap:4px;">
      <button class="tab on" data-v="rank">🏆 순위</button>
      <button class="tab" data-v="games">🕒 경기</button>
    </div>
    <button class="tab" data-v="me" style="display:flex; align-items:center; gap:4px; padding:6px 12px; margin-right:2px;">
      <span style="font-size:1.1rem">👤</span> <b id="topUserName">로그인</b>
    </button>
  </div>
  <div id="view"></div>
  <div style="text-align:center; margin-top:30px; margin-bottom:16px;">
    <span style="font-size:0.75rem; color:var(--muted);">v83</span>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
